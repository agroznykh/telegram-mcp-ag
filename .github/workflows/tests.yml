name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ensure shellcheck is available (Linux)
        if: runner.os == 'Linux'
        run: command -v shellcheck >/dev/null || (sudo apt-get update && sudo apt-get install -y shellcheck)

      - name: Ensure shellcheck is available (macOS)
        if: runner.os == 'macOS'
        run: command -v shellcheck >/dev/null || brew install shellcheck

      - name: Install PSScriptAnalyzer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest -v
